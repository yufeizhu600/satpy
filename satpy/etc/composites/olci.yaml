sensor_name: visir/olci

modifiers:

  rayleigh_corrected:
    modifier: !!python/name:satpy.modifiers.PSPRayleighReflectance
    atmosphere: us-standard
    aerosol_type: rayleigh_only
    prerequisites:
    - name: 'Oa08'
      modifiers: [sunz_corrected]
    optional_prerequisites:
    - satellite_azimuth_angle
    - satellite_zenith_angle
    - solar_azimuth_angle
    - solar_zenith_angle

  rayleigh_corrected_marine_clean:
    modifier: !!python/name:satpy.modifiers.PSPRayleighReflectance
    atmosphere: us-standard
    aerosol_type: marine_clean_aerosol
    prerequisites:
    - name: 'Oa08'
      modifiers: [sunz_corrected]
    optional_prerequisites:
    - satellite_azimuth_angle
    - satellite_zenith_angle
    - solar_azimuth_angle
    - solar_zenith_angle

  rayleigh_corrected_marine_tropical:
    modifier: !!python/name:satpy.modifiers.PSPRayleighReflectance
    atmosphere: tropical
    aerosol_type: marine_tropical_aerosol
    prerequisites:
    - name: 'Oa08'
      modifiers: [sunz_corrected]
    optional_prerequisites:
    - satellite_azimuth_angle
    - satellite_zenith_angle
    - solar_azimuth_angle
    - solar_zenith_angle

  rayleigh_corrected_desert:
    modifier: !!python/name:satpy.modifiers.PSPRayleighReflectance
    atmosphere: tropical
    aerosol_type: desert_aerosol
    prerequisites:
    - name: 'Oa08'
      modifiers: [sunz_corrected]
    optional_prerequisites:
    - satellite_azimuth_angle
    - satellite_zenith_angle
    - solar_azimuth_angle
    - solar_zenith_angle

  rayleigh_corrected_land:
    modifier: !!python/name:satpy.modifiers.PSPRayleighReflectance
    atmosphere: us-standard
    aerosol_type: continental_average_aerosol
    prerequisites:
    - name: 'Oa08'
      modifiers: [sunz_corrected]
    optional_prerequisites:
    - satellite_azimuth_angle
    - satellite_zenith_angle
    - solar_azimuth_angle
    - solar_zenith_angle


composites:
  true_color:
    compositor: !!python/name:satpy.composites.GenericCompositor
    prerequisites:
    - name: 'Oa08'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
    - name: 'Oa06'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
    - name: 'Oa03'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
    standard_name: true_color

  true_color_land:
    compositor: !!python/name:satpy.composites.GenericCompositor
    prerequisites:
    - name: 'Oa08'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_land]
    - name: 'Oa06'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_land]
    - name: 'Oa03'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_land]
    standard_name: true_color

  true_color_desert:
    compositor: !!python/name:satpy.composites.GenericCompositor
    prerequisites:
    - name: 'Oa08'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_desert]
    - name: 'Oa06'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_desert]
    - name: 'Oa03'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_desert]
    standard_name: true_color

  true_color_marine_clean:
    compositor: !!python/name:satpy.composites.GenericCompositor
    prerequisites:
    - name: 'Oa08'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_marine_clean]
    - name: 'Oa06'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_marine_clean]
    - name: 'Oa03'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_marine_clean]
    standard_name: true_color

  true_color_marine_tropical:
    compositor: !!python/name:satpy.composites.GenericCompositor
    prerequisites:
    - name: 'Oa08'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_marine_tropical]
    - name: 'Oa06'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_marine_tropical]
    - name: 'Oa03'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected_marine_tropical]
    standard_name: true_color

  true_color_raw:
    compositor: !!python/name:satpy.composites.GenericCompositor
    prerequisites:
    - name: 'Oa08'
      modifiers: [effective_solar_pathlength_corrected]
    - name: 'Oa06'
      modifiers: [effective_solar_pathlength_corrected]
    - name: 'Oa03'
      modifiers: [effective_solar_pathlength_corrected]
    standard_name: true_color

  ocean_color:
    compositor: !!python/name:satpy.composites.GenericCompositor
    prerequisites:
    - name: 'Oa08'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
    - name: 'Oa06'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
    - name: 'Oa03'
      modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
    standard_name: ocean_color

  colorized_chl_nn:
    compositor: !!python/name:satpy.composites.SingleBandCompositor
    prerequisites:
      - name: chl_nn
    standard_name: colorized_chl

  colorized_chl_oc4me:
    compositor: !!python/name:satpy.composites.SingleBandCompositor
    prerequisites:
      - name: chl_oc4me
    standard_name: colorized_chl

  mci:
    compositor: !!python/name:satpy.composites.olci.MaxChlIndex
    prerequisites:
    - name: 'Oa10'
      calibration: radiance
    - name: 'Oa11'
      calibration: radiance
    - name: 'Oa12'
      calibration: radiance
    standard_name: mci

  mci_slope:
    compositor: !!python/name:satpy.composites.olci.MCISlope
    prerequisites:
    - name: 'Oa10'
      calibration: radiance
    - name: 'Oa11'
      calibration: radiance
    - name: 'Oa12'
      calibration: radiance
    standard_name: mci_slope

  mci_derived_chla:
    compositor: !!python/name:satpy.composites.olci.MCIDerivedChla
    prerequisites:
    - name: 'Oa10'
      calibration: radiance
    - name: 'Oa11'
      calibration: radiance
    - name: 'Oa12'
      calibration: radiance
    standard_name: mci_derived_chla

  colorized_mci_derived_chla:
    compositor: !!python/name:satpy.composites.SingleBandCompositor
    prerequisites:
      - name: mci_derived_chla
    standard_name: colorized_chla

  palettized_mci_derived_chla:
    compositor: !!python/name:satpy.composites.SingleBandCompositor
    prerequisites:
      - name: mci_derived_chla
    standard_name: palettized_chla

  ndwi:
    compositor: !!python/name:satpy.composites.olci.NormalizedDifferenceWaterIndex
    prerequisites:
    - name: 'Oa16'
      calibration: radiance
    - name: 'Oa17'
      calibration: radiance
    standard_name: ndwi